<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeatherCast</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="scene">
    <div class="background-glow glow-1"></div>
    <div class="background-glow glow-2"></div>

    <div class="container">
      <h1>☁️ Weather for Cast</h1>
      
      <div class="search-box">
        <input type="text" id="cityInput" placeholder="Enter city name..." autocomplete="off">
        <button onclick="getWeather()" id="searchButton">Search</button>
      </div>

      <div class="earth-scene">
  <div id="globeContainer"></div>
</div>

<!-- Add these scripts BEFORE your script.js -->
<script src="https://unpkg.com/three@0.152.2/build/three.min.js"></script>
<script src="https://unpkg.com/globe.gl"></script>

      <div id="weatherDisplay" class="weather-card hidden">
        <!-- Filled by JavaScript -->
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
